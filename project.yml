name: Kios
developmentLanguage: en
knownRegions:
  - en
  - de

options:
  bundleIdPrefix: com.raphi011
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "KVS38S75S8"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete
    # `InferSendableFromCaptures` makes Swift treat `KeyPath`/`ReferenceWritableKeyPath`
    # as Sendable when root + value are Sendable. Silences the avalanche of
    # `#Predicate { $0.id == … }` macro-expansion warnings that SwiftData emits
    # for every @Model `var` property. Becomes the default in Swift 6.
    OTHER_SWIFT_FLAGS: "$(inherited) -enable-upcoming-feature InferSendableFromCaptures"
    # Localization: emit extractable string metadata so xcodebuild auto-populates
    # Localizable.xcstrings catalogs on build (Xcode 15+).
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_EXPORT_SUPPORTED: YES

packages:
  Readium:
    url: https://github.com/readium/swift-toolkit.git
    from: "3.9.0"
  Core:
    path: Core
  ZIPFoundation:
    url: https://github.com/readium/ZIPFoundation.git
    from: "3.0.1"

targets:
  Kios:
    type: application
    platform: iOS
    sources:
      - path: Kios
    resources:
      - path: Kios/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raphi011.kios
        INFOPLIST_FILE: Kios/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: Kios/Kios.entitlements
    dependencies:
      - package: Core
        product: Core
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      - package: Readium
        product: ReadiumOPDS
      - package: ZIPFoundation
        product: ReadiumZIPFoundation
      - target: KiosControls
    scheme:
      testTargets:
        - KiosTests
      gatherCoverageData: false

  KiosControls:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: KiosControls
      - path: Kios/Intents/OpenMostRecentBookIntent.swift
      - path: Kios/Intents/MostRecentBookSelector.swift
      - path: Kios/App/AppPaths.swift
      - path: Kios/App/BookOpenCoordinator.swift
      - path: Kios/App/ModelContainerFactory.swift
      - path: Kios/Models/Book.swift
      - path: Kios/Models/Bookmark.swift
      - path: Kios/Models/Download.swift
      - path: Kios/Models/DownloadState.swift
      - path: Kios/Models/ReadingProgress.swift
      - path: Kios/Models/ReadingSession.swift
      - path: Kios/Models/Source.swift
      - path: Kios/Views/Home/StatsAggregator.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raphi011.kios.Controls
        INFOPLIST_FILE: KiosControls/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SKIP_INSTALL: YES
    dependencies:
      - package: Core
        product: Core

  KiosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KiosTests
    resources:
      - path: KiosTests/Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raphi011.kios.tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: Kios
