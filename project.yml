name: iOSReader

options:
  bundleIdPrefix: me.iosreader
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Readium:
    url: https://github.com/readium/swift-toolkit.git
    from: "3.0.0"

targets:
  iOSReader:
    type: application
    platform: iOS
    sources:
      - path: iOSReader
    resources:
      - path: iOSReader/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.iosreader.iOSReader
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
      - package: Readium
        product: ReadiumOPDS
    scheme:
      testTargets:
        - iOSReaderTests
      gatherCoverageData: false

  iOSReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iOSReaderTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.iosreader.iOSReaderTests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: iOSReader
